services:
  rag-api:
    build: .
    container_name: vllm-rag-backend
    ports:
      - "8000:8000"
    # Mount the data folder so you can update indices without rebuilding the image
    volumes:
      - ./data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - DEVICE_TYPE=cuda
      - PYTHONUNBUFFERED=1